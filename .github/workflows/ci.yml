name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # 后端单元测试（MySQL 8.4 + MongoDB 8.3 + Redis 8.8.0）
  # ---------------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: agent_insight
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

      mongodb:
        image: mongo:8.3
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=10s

      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

    defaults:
      run:
        working-directory: agent-insight-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent && echo "MySQL ready" && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Install mongosh for MongoDB 8.3
        run: |
          curl -fsSL https://pgp.mongodb.com/server-8.0.asc | gpg --yes --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.3 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.3.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh

      - name: Create tables
        run: |
          mysql -h 127.0.0.1 -uroot -prootpass agent_insight <<'EOF'
          CREATE TABLE IF NOT EXISTS `insight_datasource` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `name` VARCHAR(100) NOT NULL,
            `type` VARCHAR(20) NOT NULL,
            `jdbc_url` VARCHAR(500) NOT NULL,
            `username` VARCHAR(100) DEFAULT NULL,
            `password` VARCHAR(200) DEFAULT NULL,
            `enabled` TINYINT(1) DEFAULT 1,
            `description` VARCHAR(500) DEFAULT NULL,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            UNIQUE KEY `uk_name` (`name`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `insight_table_config` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `datasource_id` BIGINT NOT NULL,
            `table_name` VARCHAR(100) NOT NULL,
            `display_name` VARCHAR(200) DEFAULT NULL,
            `description` VARCHAR(500) DEFAULT NULL,
            `enabled` TINYINT(1) DEFAULT 1,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            KEY `idx_datasource_id` (`datasource_id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `insight_column_config` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `table_config_id` BIGINT NOT NULL,
            `column_name` VARCHAR(100) NOT NULL,
            `display_name` VARCHAR(200) DEFAULT NULL,
            `column_type` VARCHAR(50) DEFAULT NULL,
            `description` VARCHAR(500) DEFAULT NULL,
            `display_order` INT DEFAULT 0,
            `enabled` TINYINT(1) DEFAULT 1,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            KEY `idx_table_config_id` (`table_config_id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          EOF

      - name: Initialize MongoDB metadata
        run: |
          mongosh mongodb://127.0.0.1:27017/agent_insight --quiet \
            "$(cat fixtures/mongodb/init-insight-meta.js)"

      - name: Run Maven tests
        run: >-
          mvn -q test
          -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/agent_insight
          -Dspring.datasource.username=root
          -Dspring.datasource.password=rootpass
          -Dspring.mongodb.uri=mongodb://127.0.0.1:27017/agent_insight
          -Dspring.data.redis.host=127.0.0.1

  # ---------------------------------------------------------------------------
  # 前端单元测试
  # ---------------------------------------------------------------------------
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-insight-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent-insight-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run build

      - name: Run unit tests
        run: npm test

  # ---------------------------------------------------------------------------
  # 前端 E2E 测试（依赖后端服务，已 skip；本地 dev 环境取消 skip）
  # ---------------------------------------------------------------------------
  frontend-e2e:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: agent_insight
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

      mongodb:
        image: mongo:8.3
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=10s

      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=3s
          --health-retries=5

    defaults:
      run:
        working-directory: agent-insight-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent-insight-web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent && echo "MySQL ready" && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Install mongosh for MongoDB 8.3
        run: |
          curl -fsSL https://pgp.mongodb.com/server-8.0.asc | gpg --yes --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.3 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.3.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh

      - name: Create tables
        run: |
          mysql -h 127.0.0.1 -uroot -prootpass agent_insight <<'EOF'
          CREATE TABLE IF NOT EXISTS `insight_datasource` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `name` VARCHAR(100) NOT NULL,
            `type` VARCHAR(20) NOT NULL,
            `jdbc_url` VARCHAR(500) NOT NULL,
            `username` VARCHAR(100) DEFAULT NULL,
            `password` VARCHAR(200) DEFAULT NULL,
            `enabled` TINYINT(1) DEFAULT 1,
            `description` VARCHAR(500) DEFAULT NULL,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            UNIQUE KEY `uk_name` (`name`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `insight_table_config` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `datasource_id` BIGINT NOT NULL,
            `table_name` VARCHAR(100) NOT NULL,
            `display_name` VARCHAR(200) DEFAULT NULL,
            `description` VARCHAR(500) DEFAULT NULL,
            `enabled` TINYINT(1) DEFAULT 1,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            KEY `idx_datasource_id` (`datasource_id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

          CREATE TABLE IF NOT EXISTS `insight_column_config` (
            `id` BIGINT NOT NULL AUTO_INCREMENT,
            `table_config_id` BIGINT NOT NULL,
            `column_name` VARCHAR(100) NOT NULL,
            `display_name` VARCHAR(200) DEFAULT NULL,
            `column_type` VARCHAR(50) DEFAULT NULL,
            `description` VARCHAR(500) DEFAULT NULL,
            `display_order` INT DEFAULT 0,
            `enabled` TINYINT(1) DEFAULT 1,
            `create_time` DATETIME DEFAULT CURRENT_TIMESTAMP,
            `update_time` DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
            PRIMARY KEY (`id`),
            KEY `idx_table_config_id` (`table_config_id`)
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          EOF

      - name: Initialize MongoDB metadata
        run: |
          mongosh mongodb://127.0.0.1:27017/agent_insight --quiet \
            "$(cat fixtures/mongodb/init-insight-meta.js)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # Playwright 启动 Vite dev server 在 3010（vite.config.ts）
          PLAYWRIGHT_BASE_URL: http://localhost:3010
          VITE_API_BASE_URL: /api
