name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: '选择部署服务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-insight

jobs:
  # ---------------------------------------------------------------------------
  # 构建 Docker 镜像
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    environment: xcy

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DEPLOY_REGISTRY_TOKEN }}

      # 构建后端镜像
      - name: Build and push backend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-insight-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建前端镜像
      - name: Build and push frontend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: ./agent-insight-web
          file: ./agent-insight-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 部署到远程服务器（使用 Traefik 自动发现）
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: xcy

    steps:
      - name: Dump DEPLOY_SSH_KEY fingerprint
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== Key file info ==="
          ls -la ~/.ssh/deploy_key
          wc -c ~/.ssh/deploy_key
          echo "=== First line ==="
          head -1 ~/.ssh/deploy_key
          echo "=== Last line ==="
          tail -1 ~/.ssh/deploy_key
          echo "=== sha256 of secret key ==="
          shasum -a 256 ~/.ssh/deploy_key
          echo "=== ssh-keygen -l (fingerprint) ==="
          ssh-keygen -l -f ~/.ssh/deploy_key
          echo "=== Try public key extract ==="
          ssh-keygen -y -f ~/.ssh/deploy_key
          echo "=== known_hosts add ==="
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          echo "=== Manual ssh test ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo SSH_TEST_OK" || echo "SSH_TEST_FAIL exit=$?"

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            echo "SSH OK"
            whoami
            hostname
