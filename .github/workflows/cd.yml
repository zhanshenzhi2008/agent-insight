name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: '选择部署服务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-insight

jobs:
  # ---------------------------------------------------------------------------
  # 构建 Docker 镜像
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    environment: xcy

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DEPLOY_REGISTRY_TOKEN }}

      # 构建后端镜像
      - name: Build and push backend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-insight-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建前端镜像
      - name: Build and push frontend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: ./agent-insight-web
          file: ./agent-insight-web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 部署到远程服务器（使用 Traefik 自动发现）
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: xcy

    steps:
      - name: Verify DEPLOY_SSH_KEY fingerprint
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== Key fingerprint (字节数 + sha256 + 公开指纹) ==="
          wc -c ~/.ssh/deploy_key | awk '{print "字节数: " $1}'
          shasum -a 256 ~/.ssh/deploy_key | awk '{print "sha256: " $1}'
          ssh-keygen -l -f ~/.ssh/deploy_key | awk '{print "fingerprint: " $2 " (" $1 ")"}'

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            echo "=== SSH OK ==="
            whoami
            hostname

            docker login ghcr.io -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.DEPLOY_REGISTRY_TOKEN }}"

            docker compose -f /opt/project/agent-insight/docker-compose.yml pull agent-insight-backend agent-insight-frontend
            docker compose -f /opt/project/agent-insight/docker-compose.yml up -d agent-insight-backend agent-insight-frontend

            docker compose -f /opt/project/agent-insight/docker-compose.yml ps
