name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: '选择部署服务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  # ── 镜像命名（公开信息，写在 workflow 里）──
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_PROJECT: agent-insight
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ---------------------------------------------------------------------------
  # 构建 Docker 镜像
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    environment: xcy

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.IMAGE_REGISTRY_TOKEN }}

      # 构建后端镜像
      - name: Build and push backend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'backend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-insight-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-backend:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 构建前端镜像
      - name: Build and push frontend image
        if: github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event.inputs.service == ''
        uses: docker/build-push-action@v6
        with:
          context: ./agent-insight-web
          file: ./agent-insight-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 部署到远程服务器（使用 Traefik 自动发现）
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: xcy

    steps:
      - name: Verify DEPLOY_SSH_KEY fingerprint
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== Key fingerprint (字节数 + sha256 + 公开指纹) ==="
          wc -c ~/.ssh/deploy_key | awk '{print "字节数: " $1}'
          shasum -a 256 ~/.ssh/deploy_key | awk '{print "sha256: " $1}'
          ssh-keygen -l -f ~/.ssh/deploy_key | awk '{print "fingerprint: " $2 " (" $1 ")"}'

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            echo "=== SSH OK ==="
            whoami
            hostname

            docker login ${{ env.IMAGE_REGISTRY }} -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.IMAGE_REGISTRY_TOKEN }}"

            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} pull ${{ env.IMAGE_PROJECT }}-backend ${{ env.IMAGE_PROJECT }}-frontend
            docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} up -d ${{ env.IMAGE_PROJECT }}-backend ${{ env.IMAGE_PROJECT }}-frontend
            docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} ps

