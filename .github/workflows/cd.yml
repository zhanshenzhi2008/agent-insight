name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: '选择部署服务'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - frontend

env:
  # ── 镜像命名（公开信息，写在 workflow 里）──
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_PROJECT: agent-insight
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ---------------------------------------------------------------------------
  # 检测变更范围，决定是否需要 build
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      build_backend: ${{ steps.changes.outputs.build_backend }}
      build_frontend: ${{ steps.changes.outputs.build_frontend }}
      build_any: ${{ steps.changes.outputs.build_any }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          # workflow_dispatch 触发时跳过检测（手动选择全量构建）
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "=== 手动触发，跳过变更检测，全量构建 ==="
            echo "build_backend=true" >> $GITHUB_OUTPUT
            echo "build_frontend=true" >> $GITHUB_OUTPUT
            echo "build_any=true" >> $GITHUB_OUTPUT
            echo "build_backend=true"
            echo "build_frontend=true"
            echo "build_any=true"
            exit 0
          fi

          echo "=== Compare against origin/main ==="
          git fetch origin main --depth=1
          CHANGED=$(git diff origin/main...HEAD --name-only)
          echo "$CHANGED"
          echo ""

          echo "build_backend=false" >> $GITHUB_OUTPUT
          echo "build_frontend=false" >> $GITHUB_OUTPUT
          echo "build_any=false" >> $GITHUB_OUTPUT

          for f in $CHANGED; do
            case "$f" in
              .github/workflows/cd.yml)
                echo "🔴 workflow 变更，需要全量构建"
                echo "build_backend=true" >> $GITHUB_OUTPUT
                echo "build_frontend=true" >> $GITHUB_OUTPUT
                echo "build_any=true" >> $GITHUB_OUTPUT
                ;;
              agent-insight-server/Dockerfile)
                echo "🟢 后端 Dockerfile 变更"
                echo "build_backend=true" >> $GITHUB_OUTPUT
                echo "build_any=true" >> $GITHUB_OUTPUT
                ;;
              agent-insight-server/*)
                echo "🟢 后端变更: $f"
                echo "build_backend=true" >> $GITHUB_OUTPUT
                echo "build_any=true" >> $GITHUB_OUTPUT
                ;;
              agent-insight-web/Dockerfile)
                echo "🟡 前端 Dockerfile 变更"
                echo "build_frontend=true" >> $GITHUB_OUTPUT
                echo "build_any=true" >> $GITHUB_OUTPUT
                ;;
              agent-insight-web/*)
                echo "🟡 前端变更: $f"
                echo "build_frontend=true" >> $GITHUB_OUTPUT
                echo "build_any=true" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "⚪ 无关变更: $f"
                ;;
            esac
          done

          echo ""
          echo "=== 最终判断 ==="
          echo "build_backend=${{ steps.changes.outputs.build_backend }}"
          echo "build_frontend=${{ steps.changes.outputs.build_frontend }}"
          echo "build_any=${{ steps.changes.outputs.build_any }}"

  # ---------------------------------------------------------------------------
  # 构建 Docker 镜像（仅在有代码变更时执行）
  # ---------------------------------------------------------------------------
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.build_any == 'true'
    runs-on: ubuntu-latest
    environment: xcy

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.IMAGE_REGISTRY_TOKEN }}

      - name: Build and push backend image
        if: needs.detect-changes.outputs.build_backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent-insight-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-backend:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: needs.detect-changes.outputs.build_frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./agent-insight-web
          file: ./agent-insight-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_PROJECT }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 部署到远程服务器（始终执行，直接 pull latest 镜像）
  # ---------------------------------------------------------------------------
  deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: xcy

    steps:
      - name: Verify DEPLOY_SSH_KEY fingerprint
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== Key fingerprint (字节数 + sha256 + 公开指纹) ==="
          wc -c ~/.ssh/deploy_key | awk '{print "字节数: " $1}'
          shasum -a 256 ~/.ssh/deploy_key | awk '{print "sha256: " $1}'
          ssh-keygen -l -f ~/.ssh/deploy_key | awk '{print "fingerprint: " $2 " (" $1 ")"}'

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          script: |
            set -e
            echo "=== SSH OK ==="
            whoami
            hostname

            docker login ${{ env.IMAGE_REGISTRY }} -u "${{ github.actor }}" --password-stdin <<< "${{ secrets.IMAGE_REGISTRY_TOKEN }}"
            echo "=== deploy path: ${{ secrets.DEPLOY_PATH }}"
            cd ${{ secrets.DEPLOY_PATH }}

            # 根据变更范围决定 pull/restart 哪些服务
            # build job 没运行时，latest 镜像不变，pull 也不会拉新层
            if [[ "${{ needs.detect-changes.outputs.build_backend }}" == "true" ]]; then
              echo "=== 后端有变更，pull 后端镜像 ==="
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} pull ${{ env.IMAGE_PROJECT }}-backend
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} up -d ${{ env.IMAGE_PROJECT }}-backend
            fi

            if [[ "${{ needs.detect-changes.outputs.build_frontend }}" == "true" ]]; then
              echo "=== 前端有变更，pull 前端镜像 ==="
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} pull ${{ env.IMAGE_PROJECT }}-frontend
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} up -d ${{ env.IMAGE_PROJECT }}-frontend
            fi

            if [[ "${{ needs.detect-changes.outputs.build_any }}" == "false" ]]; then
              echo "=== 无代码变更，仅 pull latest 镜像（保持最新）==="
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} pull ${{ env.IMAGE_PROJECT }}-backend ${{ env.IMAGE_PROJECT }}-frontend
              docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} up -d ${{ env.IMAGE_PROJECT }}-backend ${{ env.IMAGE_PROJECT }}-frontend
            fi

            docker compose -f ${{ secrets.DEPLOY_PATH }}/${{ env.COMPOSE_FILE }} ps
