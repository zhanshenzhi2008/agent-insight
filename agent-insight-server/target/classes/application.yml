server:
  port: 9280
  tomcat:
    connection-timeout: 600000

spring:
  application:
    name: agent-insight

  # MongoDB（explorer 元数据存储）
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://172.18.2.14:${MONGODB_PORT:-27017}/agent_insight}
      auto-index-creation: true

    redis:
      host: ${REDIS_HOST:172.18.2.14}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:}
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # HikariCP 默认连接池（用于外部数据源，按需创建）
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  # Jackson 3 兼容：使用 Jackson 2 默认值，避免 com.fasterxml.jackson 路径变化导致问题
  jackson:
    use-jackson2-defaults: true

  # Spring AI 2.0.0 配置（支持 OpenAI / Ollama / DeepSeek / Anthropic / Google GenAI）
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:EMPTY}
      base-url: ${OPENAI_BASE_URL:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:qwen2.5}
          temperature: 0.3
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:EMPTY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.3

agent-insight:
  log:
    data-root: ${INSIGHT_LOG_ROOT:/app/project/data}
    file-suffix: .log
    large-file-threshold-mb: 5
    page-size: 5000
    search-max-results: 500
  script:
    root: ${INSIGHT_SCRIPT_ROOT:/app/project/data/system/agt}
    extensions: java,py,md
  cache:
    analysis-ttl-minutes: 30
    index-ttl-hours: 24
  # AI 功能配置
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:openai}
    default-model: ${AI_MODEL:gpt-4o}
    temperature: 0.3
    timeout-seconds: 30
    column-analysis-enabled: true
    nl-query-enabled: true
    summarization-enabled: true

logging:
  level:
    root: info
    com.llm.insight: debug
    org.springframework.data.jpa: INFO
    org.hibernate.SQL: INFO

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
