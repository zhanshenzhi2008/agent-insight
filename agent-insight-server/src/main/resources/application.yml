server:
  port: 9280
  tomcat:
    connection-timeout: 600000

spring:
  application:
    name: agent-insight

  # MongoDB（explorer 元数据存储，Spring Boot 4 已改为 spring.mongodb.*）
  mongodb:
    uri: ${MONGODB_URI:mongodb://172.18.2.14:27017/agent_insight}

  data:
    redis:
      host: ${REDIS_HOST:172.18.2.14}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:}
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # 主数据源（HikariCP）：agent-insight 自身业务库。
  # 包含两张自建业务表（insight_ai_model 等）+ 未来扩展。
  # 注：log_llm_* 轨迹表由独立的 jdbc-template 连接 external-biz 业务库，
  #     不在主数据源里（按业务隔离原则，避免 schema 跨界）。
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/agent_insight?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME:}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: AgentInsightHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      # 启动时若数据库不可达，不阻塞应用启动（仅日志告警）
      initialization-fail-timeout: -1

  # Jackson 3 兼容：使用 Jackson 2 默认值，避免 com.fasterxml.jackson 路径变化导致问题
  jackson:
    use-jackson2-defaults: true

  # JPA（Hibernate 7）：显式指定 MySQL 方言，并在 DB 不可达时允许跳过 JDBC metadata 查询
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Shanghai
        # 启动时不通过 JDBC 拉取数据库元数据（版本/事务隔离级别等），
        # 让应用在数据库临时不可达时也能完成启动；方言已显式指定。
        boot:
          allow_jdbc_metadata_access: false
    open-in-view: false
    show-sql: false

  # Spring AI 2.0.0 配置（支持 OpenAI / Ollama / DeepSeek / Anthropic / Google GenAI）
  # Spring Boot 4 + Spring AI 2.0.0：chat.options.* 已迁移到 chat.*
  #   修复 2026-07-19：spring.ai.model.chat 控制哪个 provider 自动激活。
  #    默认激活 OpenAI（matchIfMissing=true 的默认值），关闭 DeepSeek/Anthropic/Google 自动配置。
  #    DeepSeek/Anthropic/Google 改由 DynamicChatModelFactory 从数据库动态创建。
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:openai}    # openai 是 matchIfMissing 的默认；改其他值要重启 + 改 pom
    openai:
      # 空字符串 = 让 Spring AI 用 no-auth-placeholder，运行时按 AI_ENABLED 决定是否调用
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:}
      chat:
        model: ${OPENAI_MODEL:gpt-4o}
        temperature: 0.3
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5}
        temperature: 0.3
    # DeepSeek / Anthropic / Google 不在 application.yml 留任何字段，
    # 避免触发 Spring AI 的自动配置（matchIfMissing=true）。
    # 这些 vendor 完全由 DynamicChatModelFactory 从数据库动态构建。

agent-insight:
  log:
    data-root: ${INSIGHT_LOG_ROOT:/app/project/data}
    file-suffix: .log
    large-file-threshold-mb: 5
    page-size: 5000
    search-max-results: 500
  script:
    root: ${INSIGHT_SCRIPT_ROOT:/app/project/data/system/agt}
    extensions: java,py,md
  cache:
    analysis-ttl-minutes: 30
    index-ttl-hours: 24
  security:
    # AES-256-GCM 加密密钥（32 字节 base64 编码），用于 insight_ai_model.token_encrypted 等敏感字段。
    # ⚠️ 这是 dev 占位 key（openssl rand -base64 32 一次性生成），正式部署必须通过 ENV INSIGHT_ENCRYPTION_KEY 覆盖。
    encryption-key: ${INSIGHT_ENCRYPTION_KEY:IcZ+z06pZwNgemWM7jB7jJH8uVbpJo9GlWNGylQuFHs=}
  ai:
    enabled: ${AI_ENABLED:false}
    provider: ${AI_PROVIDER:openai}
    default-model: ${AI_MODEL:gpt-4o}
    temperature: 0.3
    timeout-seconds: 30
    column-analysis-enabled: true
    nl-query-enabled: true
    summarization-enabled: true

logging:
  level:
    root: info
    com.llm.insight: debug
    org.springframework.data.jpa: INFO
    org.hibernate.SQL: INFO
    # MongoDB driver：连接异常（端口不可达/不是 mongod 协议）刷屏，关闭 monitor 线程日志
    org.mongodb.driver.cluster: OFF
    org.mongodb.driver.connection: OFF
    org.mongodb.driver.protocol: OFF

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      # 只保留 ping 检查，避免下游服务黑洞阻塞 health 响应
      group:
        liveness:
          include: ping
        readiness:
          include: ping
